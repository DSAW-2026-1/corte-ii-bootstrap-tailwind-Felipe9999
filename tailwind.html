<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

        <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
        
        <title>Tailwind | Stats preview card component</title>
        
        <link rel="stylesheet" href="styles-tailwind.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <style type="text/tailwindcss">

        </style>
    </head>
    <body class="relative">
        <main class="min-h-screen flex items-center max-w-6xl mx-auto px-5 py-8 relative">
            <div class="rounded-lg overflow-hidden myCard">
                <div class="md:flex md:flex-row-reverse md:items-center">
                    <div class="imgBg md:w-1/2">
                        <picture>
                            <source media="(max-width:47.99rem)" srcset="images/image-header-mobile.jpg">
                            <img src="images/image-header-desktop.jpg" alt="Header image" loading="lazy" width="700" height="500" class="w-full h-auto block opacity-75">
                        </picture>
                    </div>
                    <div class="px-6 lg:px-14 py-7 md:py-0 lg:py-10 md:w-1/2">
                        <h1 class="text-3xl lg:text-4xl font-bold inter mb-4 sm:mb-8 mt-3 md:mt-0 title text-center md:text-left xl:pr-10 lg:mt-2">Get <em>insights</em> that help your business grow.</h1>
                        <p class="px-0 text-gray-600 lexend mb-5 lg:mb-18 text-base text-center md:text-left font-normal xl:pr-10">Discover the benefits of data analytics and make better decisions regarding revenue, customer
                        experience, and overall efficiency.</p>

                        <ul class="flex flex-col items-center md:flex-row md:justify-between md:items-end gap-6 md:gap-4 pt-3 lg:pt-0 px-0 mb-2 md:mb-0">
                            <li class="md:flex-1 flex flex-col items-center md:items-start justify-start md:justify-end text-center md:text-left">
                                <h2 class="text-2xl font-bold title mb-0">10k+</h2>
                                <p class="text-xs uppercase text-white/60 mt-1 data">COMPANIES</p>
                            </li>
                            <li class="md:flex-1 flex flex-col items-center md:items-start justify-start md:justify-end text-center md:text-left">
                                <h2 class="text-2xl font-bold title mb-0">314</h2>
                                <p class="text-xs uppercase text-white/60 mt-1 data">TEMPLATES</p>
                            </li>
                            <li class="md:flex-1 flex flex-col items-center md:items-start justify-start md:justify-end text-center md:text-left">
                                <h2 class="text-2xl font-bold title mb-0">12M+</h2>
                                <p class="text-xs uppercase text-white/60 mt-1 data">QUERIES</p>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            
        </main>
        <p class="attribution absolute bottom-0 text-center w-full">
            Coded by <a href="#">Felipe9999</a>.
        </p>
    </body>
</html>
