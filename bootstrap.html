<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

        <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
        
        <title>Bootstrap | Stats preview card component</title>

        <link rel="stylesheet" href="styles-bootstrap.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    </head>
    <body class="container col-xxl-8 px-4 py-5">
        <main class="pb-0 pe-lg-0 rounded-3 border gy-0 overflow-hidden">
            <div class="row flex-lg-row-reverse align-items-center">
                <div class="col-sm col-lg-6 gy-0"> 
                    <img src="images/image-header-desktop.jpg" class="d-block mx-lg-auto img-fluid" alt="Header image" width="700" height="500" loading="lazy"> 
                </div>
                <div class="col-lg-6 gx-5">
                    <h1 class="display-5 fw-bold text-body-emphasis lh-1 mb-3">Get insights that help your business grow.</h1>
                    <p class="lead">Discover the benefits of data analytics and make better decisions regarding revenue, customer
                    experience, and overall efficiency.</p>
                    <ul>
                        <li>10k+ companies</li>
                        <li>314 templates</li>
                        <li>12m+ queries</li>
                    </ul>
                </div>
            </div>
        </main>
        <div class="attribution mt-4">
            Coded by <a href="#">Felipe9999</a>.
        </div>
    </body>
</html>
