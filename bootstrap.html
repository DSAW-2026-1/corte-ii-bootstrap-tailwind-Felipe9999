<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

        <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
        
        <title>Bootstrap | Stats preview card component</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="styles-bootstrap.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    </head>
    <body class="container col-xxl-10 px-5 py-5">
        <main class="pb-0 pe-lg-0 rounded-3 border gy-0 overflow-hidden">
            <div class="row flex-lg-row-reverse align-items-center">
                <div class="col-sm col-lg-6 gy-0"> 
                    <img src="images/image-header-desktop.jpg" class="d-block mx-lg-auto img-fluid" alt="Header image" width="700" height="500" loading="lazy"> 
                </div>
                <div class="col-lg-6 sqPadding">
                    <h1 class="h1 inter bold">Get insights that help your business grow.</h1>
                    <p class="lexend">Discover the benefits of data analytics and make better decisions regarding revenue, customer
                    experience, and overall efficiency.</p>
                    <ul class="row gx-0 px-0 inter mt-auto mb-0 align-items-end" type="none">
                        <li class="col">
                            <h2 class="h5 dataHeader bold mb-0">10k+</h2>
                            <p class="mb-0">companies</p> 
                        </li>
                        <li class="col">
                            <h2 class="h5 dataHeader bold mb-0">314</h2>
                            <p class="mb-0">templates</p> 
                        </li>
                        <li class="col">
                            <h2 class="h5 dataHeader bold mb-0">12m+</h2>
                            <p class="mb-0">queries</p> 
                        </li>
                    </ul>
                </div>
            </div>
        </main>
        <div class="attribution mt-4">
            Coded by <a href="#">Felipe9999</a>.
        </div>
    </body>
</html>
